services:
  - type: web
    name: astro-vending-machine
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn vending_machine.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: astro-database
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: DISABLE_COLLECTSTATIC
        value: "0"

databases:
  - name: astro-database
    plan: free